<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var page = params.get("page") || "projects";
  var allowed = ["projects", "papers", "cv", "blog"];

  var titleEl = document.getElementById("page-title");
  var contentEl = document.getElementById("page-content");
  var nav = document.getElementById("site-nav");

  if (nav && allowed.indexOf(page) !== -1) {
    var active = nav.querySelector('[data-nav="' + page + '"]');
    if (active) active.setAttribute("aria-current", "page");
  }

  if (allowed.indexOf(page) === -1) {
    titleEl.textContent = "404";
    contentEl.textContent = "Page not found. Use the navigation above.";
    contentEl.className = "page-content--plain";
    document.title = "404 — sqazi.sh";
    return;
  }

  var defaultH1 = document.documentElement.getAttribute("data-content-h1");
  var labels = { projects: "Projects", papers: "Papers", cv: "CV", blog: "Blog" };
  titleEl.textContent = defaultH1 || labels[page] || page.charAt(0).toUpperCase() + page.slice(1);

  function loadHtmlFragment(url, selector, failLabel) {
    fetch(url)
      .then(function (res) {
        if (!res.ok) throw new Error(res.status);
        return res.text();
      })
      .then(function (html) {
        var doc = new DOMParser().parseFromString(html, "text/html");
        var root = doc.querySelector(selector);
        contentEl.className = "";
        if (root) {
          contentEl.innerHTML = "";
          contentEl.appendChild(document.importNode(root, true));
        } else {
          contentEl.className = "page-content--plain";
          contentEl.textContent = failLabel + " could not be loaded.";
        }
      })
      .catch(function () {
        contentEl.className = "page-content--plain";
        contentEl.textContent = failLabel + " could not be loaded. Check back later.";
      });
  }

  if (page === "projects") {
    loadHtmlFragment("content/projects.html", ".projects-page", "Projects");
    return;
  }

  contentEl.className = "page-content--plain";
  fetch("content/" + page + ".txt")
    .then(function (res) {
      if (!res.ok) throw new Error(res.status);
      return res.text();
    })
    .then(function (text) {
      /* CV: keep github.com hrefs (recruiters expect repo URLs; cv.txt is plain for ATS). */
      var opts = { linkGithubReposToProjects: false };
      if (globalThis.PlainContent) {
        PlainContent.renderInto(contentEl, text, opts);
      } else {
        contentEl.textContent = text;
      }
    })
    .catch(function () {
      contentEl.textContent = "Content not available yet. Check back later.";
    });
})();
</script>
