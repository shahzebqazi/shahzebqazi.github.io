<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var page = params.get("page") || "projects";
  var allowed = ["projects", "papers", "cv", "blog"];

  var titleEl = document.getElementById("page-title");
  var contentEl = document.getElementById("page-content");

  if (allowed.indexOf(page) === -1) {
    titleEl.textContent = "404";
    contentEl.textContent = "Page not found. Use the navigation above.";
    return;
  }

  titleEl.textContent = page.charAt(0).toUpperCase() + page.slice(1);
  document.title = titleEl.textContent + " — Shahzeb Qazi";

  fetch("content/" + page + ".txt")
    .then(function (res) {
      if (!res.ok) throw new Error(res.status);
      return res.text();
    })
    .then(function (text) {
      contentEl.textContent = text;
    })
    .catch(function () {
      contentEl.textContent = "Content not available yet. Check back later.";
    });
})();
</script>
